<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Business Finder — Live</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0f172a; color:#e2e8f0; font-family:-apple-system,sans-serif; height:100vh; display:flex; flex-direction:column; }
.header { background:#1e293b; padding:12px 16px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid #334155; flex-shrink:0; }
.title { font-size:14px; font-weight:700; color:#f1f5f9; }
.right { display:flex; align-items:center; gap:10px; }
.badge { display:flex; align-items:center; gap:5px; background:#052e16; border:1px solid #166534; border-radius:20px; padding:3px 10px; font-size:10px; color:#4ade80; font-weight:600; }
.dot { width:6px; height:6px; background:#4ade80; border-radius:50%; animation:blink 1.4s infinite; }
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}
.count { font-size:12px; color:#94a3b8; }
.count span { color:#4ade80; font-weight:700; }
.copy-btn { padding:6px 16px; background:#dc2626; color:#fff; border:none; border-radius:5px; font-size:11px; font-weight:700; cursor:pointer; }
.copy-btn:hover { background:#b91c1c; }
.list { flex:1; overflow-y:auto; padding:10px 16px; }
.item { display:flex; align-items:center; gap:10px; padding:6px 0; border-bottom:1px solid #1e293b; }
.num { font-size:10px; color:#475569; min-width:28px; text-align:right; flex-shrink:0; }
.link { font-family:'Courier New',monospace; font-size:12px; color:#7dd3fc; flex:1; word-break:break-all; }
.empty { text-align:center; padding:60px 20px; color:#334155; font-size:13px; }
.status { text-align:center; padding:4px; font-size:9px; color:#475569; flex-shrink:0; border-top:1px solid #1e293b; }
</style>
</head>
<body>
<div class="header">
  <span class="title">⚡ Business Finder — Live</span>
  <div class="right">
    <span class="count">Total: <span id="totalCount">0</span></span>
    <button class="copy-btn" id="copyBtn">Copy All</button>
    <span class="badge"><span class="dot"></span> LIVE</span>
  </div>
</div>
<div class="list" id="list">
  <div class="empty">Extension chal rahi hogi tab results aenge...</div>
</div>
<div class="status" id="status">Connecting...</div>

<script>
const FIREBASE_URL = "https://business-finder-a9d12-default-rtdb.firebaseio.com";
let allResults = [];
let lastCount  = 0;

function render() {
  const list = document.getElementById('list');
  if (!allResults.length) {
    list.innerHTML = '<div class="empty">Extension chal rahi hogi tab results aenge...</div>';
    return;
  }
  list.innerHTML = allResults.map((url, i) =>
    `<div class="item">
      <span class="num">${i + 1}.</span>
      <span class="link">${url}</span>
    </div>`
  ).join('');
  // Auto scroll to bottom — naye links neeche
  list.scrollTop = list.scrollHeight;
}

async function load() {
  try {
    const res  = await fetch(FIREBASE_URL + "/results.json");
    const data = await res.json();
    if (!data) {
      document.getElementById('status').textContent = 'Connected — Extension start karo...';
      return;
    }
    // Timestamp ke order mein sort karo — naye neeche
    const items = Object.values(data)
      .filter(i => i && i.url)
      .sort((a, b) => (a.ts || 0) - (b.ts || 0));
    
    const urls = items.map(i => i.url);
    
    if (urls.length !== lastCount) {
      lastCount  = urls.length;
      allResults = urls;
      document.getElementById('totalCount').textContent = urls.length;
      document.getElementById('status').textContent = 'Updated: ' + new Date().toLocaleTimeString();
      render();
    }
  } catch(e) {
    document.getElementById('status').textContent = 'Retry...';
  }
}

// Copy — sirf links, koi prefix nahi
document.getElementById('copyBtn').addEventListener('click', () => {
  if (!allResults.length) return;
  navigator.clipboard.writeText(allResults.join('\n')).then(() => {
    const b = document.getElementById('copyBtn');
    b.textContent = '✓ Copied ' + allResults.length;
    setTimeout(() => b.textContent = 'Copy All', 2000);
  });
});

load();
setInterval(load, 3000);
</script>
</body>
</html>
